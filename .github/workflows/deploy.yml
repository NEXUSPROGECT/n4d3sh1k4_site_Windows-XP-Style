name: Deploy Static Site

on:
  push:
    branches:
      - main # Запуск при пуше в ветку main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-server:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    
    steps:
      # Подключаем раннер GitHub Actions к твоей сети Tailscale
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Теперь раннер внутри сети Tailscale и может достучаться до сервера
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_TAILSCALE_IP }} # Имя сервера в сети Tailscale (то, что ты используешь после 'ssh пользователь@...')
          username: ${{ secrets.SERVER_USER }}       # Пользователь
          key: ${{ secrets.SERVER_SSH_KEY }}         # Приватный SSH ключ
          script: |
            # Логинимся в GitHub Container Registry на сервере
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Скачиваем новый образ
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:main
            
            # Останавливаем и удаляем старый контейнер (если есть)
            docker stop my-portfolio-site || true
            docker rm my-portfolio-site || true
            
            # Запускаем новый контейнер
            # Если 80 порт занят, поменяй левую часть (например, -p 8080:80)
            docker run -d --name my-portfolio-site -p 80:80 --restart unless-stopped ghcr.io/${{ env.IMAGE_NAME }}:main
